<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arun web</title>
    <!-- <link rel="stylesheet" href="{{url_for('static',filename='css/style.css')}}"> -->
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="nav">
        <h2><i>Arun Blog</i>.</h2>
        <div >
            <a class="nav-a-tag" href="/home.html">Home</a>
            <a class="nav-a-tag" href="/user_login.html">Login</a>
            <a class="nav-a-tag" href="/signup.html">Register</a>
        </div>
    </nav>
    <section class="login-box">
        <form onsubmit="register(event)">
            <h2>Register</h2>
            <p class="input-box">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter your name" required>
            </p>

            <p class="input-box">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="enter email" required>
            </p>
            <p class="input-box">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="password" required>
            </p>
            
            <div class="button-box">            
                <button type="reset">Reset</button> 
                <button type="submit">Submit</button>
            </div><br>

            <p id="message"></p><br>

            <p class="regi-line" >Already have an account?&nbsp;<a href="/user_login.html">Login</a></p>

            <p></p><br>

        </form>
    </section>
    <footer>
       ---  © 2026 Arun Web | Built with Flask & MongoDB  ---
    </footer>

</body>
<script>
   async function register(event) {

    event.preventDefault()   // form reload stop

    const username = document.getElementById("username").value
    const email = document.getElementById("email").value
    const password = document.getElementById("password").value

    try{
        const response = await fetch("http://127.0.0.1:5000/api/register",{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({
                username:username,
                email:email,
                password:password
            })
        })

        const data = await response.json()

        if(response.ok){
            alert("Register successful")

            window.location.href = "user_login.html";
        }
        else{
            document.getElementById("message").innerText = data.msg
        }
    }

    catch(error){
        document.getElementById("message").innerText = "Server error"
        console.error(error);
    }
}
    
</script>

</html>
