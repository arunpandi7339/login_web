<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arun web</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="nav">
        <h2><i>Arun Blog</i> .</h2>
        <div >
            <a class="nav-a-tag" href="/home.html">Home</a>
            <a class="nav-a-tag" href="/user_login.html">Login</a>
            <a class="nav-a-tag" href="/signup.html">Register</a>
        </div>
    </nav>
    <section class="login-box">
        
        <form onsubmit="login(event)">
            <h2>Login</h2>
            <p class="input-box">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter your name" required>
            </p>

            <p class="input-box">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="password" required>
            </p>

            
            <div class="button-box">            
                <button type="reset">Reset</button> 
                <button type="submit">Submit</button>
            </div><br><br>

            <p id="message"></p><br>

            <p class="regi-line">Don't have an account? &nbsp;<a href="/signup.html">Register</a></p>

            <p></p>

        </form><br><br><br>
    </section>
    <footer>
       ---  © 2026 Arun Web | Built with Flask & MongoDB  ---
    </footer>

</body>
<script>
async function login(event) {

    event.preventDefault()

    const username = document.getElementById("username").value
    const password = document.getElementById("password").value

    try{

        const response = await fetch("http://127.0.0.1:5000/api/login",{

            method:"POST",

            credentials: "include",
            
            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({
                username:username,
                password:password
            })
        })

        const data = await response.json()

        if(response.ok){

            localStorage.setItem("token", data.token)

            alert("Login successful")

            window.location.href="/dashboard.html"

        }else{
            document.getElementById("message").innerText = data.msg
        }

    }catch(error){
        // document.getElementById("message").innerText = "server error"
        
        document.getElementById("message").innerText = error.msg
        console.error(error)
    }
}
</script>

</html>
